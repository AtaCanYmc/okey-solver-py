[tool.poetry]
name = "okey-solver-py"
version = "0.1.0"
description = "Python port of okey-solver-ts and okey-vision-ts"
authors = ["Ata Can Yaymacı <atacanymc@gmail.com>"]
packages = [
    { include = "okey_solver" },
    { include = "okey_vision" }
]

[tool.poetry.dependencies]
python = "^3.10"
pydantic = "^2.0"
numpy = ">=1.20,<3.0"
opencv-python = "^4.0"
pillow = "^10.0"
requests = "^2.31"
ultralytics = "^8.0"

[tool.poetry.group.dev.dependencies]
pytest = ">=8,<10"
mypy = "^1.0"
ruff = "^0.3"

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"
