site_name: okey-solver-py
site_description: "Enterprise Okey & Rummikub hand arranger and visual solver library"
theme:
  name: material
  palette:
    scheme: slate
    primary: indigo
    accent: indigo
  features:
    - navigation.tabs
    - content.code.copy
nav:
  - Home: index.md
  - Architecture: ARCHITECTURE.md
  - Game Rules: ALGORITHM_RULES.md
  - CLI Usage: CLI_USAGE.md
plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
