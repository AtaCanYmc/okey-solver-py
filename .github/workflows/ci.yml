name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install Poetry
        run: |
          curl -sSL https://install.python-poetry.org | python3 -

      - name: Install dependencies
        run: |
          poetry install

      - name: Run Ruff Linter
        run: |
          poetry run ruff check src/okey_solver src/okey_vision tests

      - name: Run Ruff Formatter check
        run: |
          poetry run ruff format --check src/okey_solver src/okey_vision tests

      - name: Run pytest
        run: |
          PYTHONPATH=src poetry run pytest
