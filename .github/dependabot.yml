version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/Istanbul"
    
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    
    groups:
      dev-dependencies:
        patterns:
          - "pytest"
          - "ruff"
          - "mypy"
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/Istanbul"
    
    commit-message:
      prefix: "chore(deps-actions)"

    open-pull-requests-limit: 5
    rebase-strategy: "auto"
